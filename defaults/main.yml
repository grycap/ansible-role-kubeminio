# Release version of minio
chart_release: '5.0.14'
# Access key credential for object storage and web access
minio_accesskey: 'minio'
# Secret key credential for object storage and web access
minio_secretkey: 'minio123'
# Deploy in Kubernetes Master node
master_deploy: false
# Labels used to match with created PersistentVolume
volume_labels: {}
# Enable secure connection through HTTPS using self-signed certs
enable_tls: true
# Default kubeconfig path
kubeconfig_path: '/etc/kubernetes/admin.conf'
# Enable ingress with a custom DNS host
enable_ingress: false
# Enable HTTPRoute with a custom DNS host
enable_httproute: false
# Name and namespace of the Gateway to be used if HTTPRoute is enabled
httproute:
  type: traefik # or nginx
  gateway:
    name: traefik-gateway
    namespace: traefik
# Hostname for the ingress (API)
public_hostname_api: "''"
# Hostname for the ingress (Console)
public_hostname_console: "''"
# Cert-manager issuer
ingress_certmanager_issuer: 'letsencrypt-prod'
# List of buckets to be created
buckets: []
  #   # Name of the bucket
  # - name: bucket1
  #   # Policy to be set on the
  #   # bucket [none|download|upload|public]
  #   policy: none
  #   # Purge if bucket exists already
  #   purge: false
  #   # set versioning for
  #   # bucket [true|false]
  #   versioning: false # remove this key if you do not want versioning feature
  #   # set objectlocking for
  #   # bucket [true|false] NOTE: versioning is enabled by default if you use locking
  #   objectlocking: false
  # - name: bucket2
  #   policy: none
  #   purge: false
  #   versioning: true
  #   # set objectlocking for
  #   # bucket [true|false] NOTE: versioning is enabled by default if you use locking
  #   objectlocking: false
# Value to set in the annotation nginx.ingress.kubernetes.io/proxy-body-size
# that will set the maximum size of the chunk files sent to minio "0" means no limit
ingress_proxy_body_size: "0"